{% extends "base.html" %}

{% block content %}
<div class="mb-8 sm:mb-10">
    <div class="flex items-center justify-between mb-6 sm:mb-8 animate-fade-in">
        <div>
            <h1 class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight">관리자 센터</h1>
            <p class="text-slate-400 font-medium mt-1 text-sm sm:text-base">SICK 시스템을 관리하고 모니터링합니다.</p>
        </div>
        <div class="bg-indigo-50 p-2.5 sm:p-3 rounded-2xl shrink-0 ml-4">
            <i data-lucide="shield-check" class="w-6 h-6 sm:w-8 sm:h-8 text-indigo-600"></i>
        </div>
    </div>

    <!-- Scrollable tabs on mobile -->
    <div class="overflow-x-auto -mx-4 px-4 sm:mx-0 sm:px-0 scrollbar-none">
        <div class="flex p-1.5 bg-slate-100 rounded-2xl w-max sm:w-max gap-1 min-w-full sm:min-w-0">
            <a href="{{ url_for('admin_dashboard') }}"
               class="flex-1 sm:flex-none px-4 sm:px-6 py-2.5 sm:py-3 rounded-xl text-xs sm:text-sm font-bold flex items-center justify-center gap-1.5 sm:gap-2 transition-all whitespace-nowrap
               {% if request.endpoint == 'admin_dashboard' %}bg-white text-blue-600 shadow-sm shadow-slate-200{% else %}text-slate-500 hover:text-slate-800 hover:bg-slate-50{% endif %}">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                대시보드
            </a>
            <a href="{{ url_for('admin_users') }}"
               class="flex-1 sm:flex-none px-4 sm:px-6 py-2.5 sm:py-3 rounded-xl text-xs sm:text-sm font-bold flex items-center justify-center gap-1.5 sm:gap-2 transition-all whitespace-nowrap
               {% if request.endpoint in ('admin_users',) %}bg-white text-blue-600 shadow-sm shadow-slate-200{% else %}text-slate-500 hover:text-slate-800 hover:bg-slate-50{% endif %}">
                <i data-lucide="users" class="w-4 h-4"></i>
                유저 관리
            </a>
            <a href="{{ url_for('admin_records') }}"
               class="flex-1 sm:flex-none px-4 sm:px-6 py-2.5 sm:py-3 rounded-xl text-xs sm:text-sm font-bold flex items-center justify-center gap-1.5 sm:gap-2 transition-all whitespace-nowrap
               {% if request.endpoint == 'admin_records' %}bg-white text-blue-600 shadow-sm shadow-slate-200{% else %}text-slate-500 hover:text-slate-800 hover:bg-slate-50{% endif %}">
                <i data-lucide="list-ordered" class="w-4 h-4"></i>
                상세 조회
            </a>
        </div>
    </div>
</div>

<div class="animate-fade-in-up">
    {% block admin_content %}{% endblock %}
</div>
{% endblock %}
