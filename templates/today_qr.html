{% extends "base.html" %}
{% block title %}오늘의 QR코드 - SICK{% endblock %}

{% block content %}
<div class="max-w-sm sm:max-w-md mx-auto px-2 mt-4 sm:mt-10 text-center">
    <header class="mb-8 sm:mb-10 animate-fade-in">
        <h1 class="text-2xl sm:text-3xl font-black text-slate-900 mb-2">오늘의 QR코드</h1>
        <p class="text-slate-400 font-medium text-sm sm:text-base">식수 체크인을 위해 아래 코드를 스캔하세요.</p>
    </header>

    <div class="relative group animate-fade-in-up">
        <!-- Decorative glow -->
        <div class="absolute -inset-1 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-[2.5rem] blur-lg opacity-20 group-hover:opacity-35 transition duration-500"></div>

        <div class="relative bg-white p-6 sm:p-10 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100">
            <div class="relative inline-block mb-6 sm:mb-8">
                <!-- QR pulse border -->
                <div class="absolute -inset-2 border-2 border-blue-400/30 rounded-2xl animate-pulse"></div>
                <img src="data:image/png;base64,{{ qr_b64 }}" alt="QR Code"
                    class="relative w-52 h-52 sm:w-64 sm:h-64 mx-auto rounded-xl shadow-inner border border-slate-100 p-2"
                    style="image-rendering: pixelated;">
            </div>

            <div class="space-y-4">
                <div class="inline-flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-full border border-slate-100">
                    <i data-lucide="clock" class="w-4 h-4 text-slate-400"></i>
                    <span class="text-xs sm:text-sm font-bold text-slate-500">생성 시간: {{ gen_time }}</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
