{% extends "base.html" %}
{% block title %}비밀번호 변경 - SICK{% endblock %}

{% block content %}
<div class="max-w-sm sm:max-w-md mx-auto mt-8 sm:mt-20 px-2 text-center">
    <div class="inline-flex bg-amber-100 p-4 rounded-3xl text-amber-600 mb-6 sm:mb-8">
        <i data-lucide="key-round" class="w-9 h-9 sm:w-10 sm:h-10"></i>
    </div>

    <h1 class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight mb-3">비밀번호 변경</h1>

    {% if current_user.must_change_password %}
    <div class="bg-red-50 text-red-600 px-4 sm:px-6 py-2.5 rounded-2xl inline-flex items-center gap-2 text-xs sm:text-sm font-bold mb-8 sm:mb-10 border border-red-100">
        <i data-lucide="alert-triangle" class="w-4 h-4 shrink-0"></i>
        서비스를 이용하려면 비밀번호를 변경해야 합니다.
    </div>
    {% else %}
    <p class="text-slate-400 font-medium mb-8 sm:mb-10 text-sm sm:text-base">보안을 위해 비밀번호를 정기적으로 변경해 주세요.</p>
    {% endif %}

    <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100/80 text-left">
        <form method="POST" class="space-y-5">
            <div class="space-y-2">
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">현재 비밀번호</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-300 group-focus-within:text-blue-500 transition-colors">
                        <i data-lucide="shield-check" class="w-4 h-4"></i>
                    </div>
                    <input type="password" name="current_password" required placeholder="현재 비밀번호 입력"
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:bg-white outline-none transition-all font-medium text-sm sm:text-base">
                </div>
            </div>

            <div class="space-y-4 pt-3 border-t border-slate-100">
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">새 비밀번호</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-300 group-focus-within:text-emerald-500 transition-colors">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </div>
                        <input type="password" name="new_password" required placeholder="새로운 비밀번호 입력"
                            class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 focus:bg-white outline-none transition-all font-medium text-sm sm:text-base">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">새 비밀번호 확인</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-300 group-focus-within:text-emerald-500 transition-colors">
                            <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                        </div>
                        <input type="password" name="confirm_password" required placeholder="한 번 더 입력"
                            class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 focus:bg-white outline-none transition-all font-medium text-sm sm:text-base">
                    </div>
                </div>
            </div>

            <button type="submit"
                class="w-full bg-slate-900 text-white py-3.5 sm:py-4 rounded-2xl hover:bg-slate-800 active:scale-[0.98] transition-all font-bold text-base sm:text-lg shadow-lg flex items-center justify-center gap-2 mt-2">
                비밀번호 저장하기
                <i data-lucide="check" class="w-5 h-5"></i>
            </button>
        </form>
    </div>

    <a href="{{ url_for('logout') }}"
       class="inline-flex items-center gap-2 mt-6 text-sm font-bold text-slate-400 hover:text-red-500 transition-colors">
        <i data-lucide="log-out" class="w-4 h-4"></i>
        로그아웃
    </a>
</div>
{% endblock %}
