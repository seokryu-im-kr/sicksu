{% extends "base.html" %}
{% block title %}로그인 - SICK{% endblock %}

{% block content %}
<div class="max-w-sm sm:max-w-md mx-auto mt-8 sm:mt-20 px-2">
    <div class="text-center mb-8 sm:mb-10">
        <div class="inline-flex bg-gradient-to-br from-blue-600 to-indigo-600 p-4 rounded-3xl shadow-xl shadow-blue-200/50 mb-6">
            <i data-lucide="utensils" class="w-9 h-9 sm:w-10 sm:h-10 text-white"></i>
        </div>
        <h1 class="text-3xl sm:text-4xl font-black text-slate-900 tracking-tight mb-2">SICK</h1>
        <p class="text-slate-400 font-medium text-sm sm:text-base">스마트한 관리 시스템</p>
    </div>

    <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100/80">
        <form method="POST" class="space-y-5">
            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">아이디</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                    <input type="text" name="username" required autofocus placeholder="아이디를 입력하세요"
                        class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:bg-white outline-none transition-all placeholder:text-slate-400 text-sm sm:text-base">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">비밀번호</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </div>
                    <input type="password" name="password" required placeholder="비밀번호를 입력하세요"
                        class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:bg-white outline-none transition-all placeholder:text-slate-400 text-sm sm:text-base">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3.5 sm:py-4 rounded-2xl hover:from-blue-700 hover:to-indigo-700 active:scale-[0.98] transition-all font-bold text-base sm:text-lg shadow-lg shadow-blue-200/50 flex items-center justify-center gap-2 mt-2">
                로그인하기
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>
    </div>

    <p class="mt-8 sm:mt-10 text-center text-slate-300 text-xs sm:text-sm font-medium">
        &copy; 2026 SICK Team
    </p>
</div>
{% endblock %}
